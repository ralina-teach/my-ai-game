<!DOCTYPE html>
<html>
<head>
    <title>SUBWAY SURFERS 3D - FULL VERSION</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #score { position: absolute; top: 20px; left: 20px; color: white; font-size: 38px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 12px 28px; border-radius: 30px; z-index: 100; border: 2px solid #ffcc00; }
    </style>
</head>
<body>
    <div id="score">🏃‍♂️ СЧЁТ: 0</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com",
            "three/addons/": "https://unpkg.com"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        // ДОРОГА (ЗЕМЛЯ)
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshStandardMaterial({ color: 0x3a6a4a }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // МАГАЗИНЧИКИ И ДЕРЕВЬЯ (твой оригинальный стиль)
        for (let i = -50; i < 50; i += 10) {
            // Дерево
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 2), new THREE.MeshStandardMaterial({color: 0x8B4513}));
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(1, 2, 8), new THREE.MeshStandardMaterial({color: 0x228B22}));
            foliage.position.y = 1.5;
            tree.add(trunk); tree.add(foliage);
            tree.position.set(6, 1, i);
            scene.add(tree);

            // Магазинчик
            const shop = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 2), new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff}));
            shop.position.set(-6, 1.5, i + 5);
            scene.add(shop);
        }

        // ЗАГРУЗКА МОДЕЛИ (УТОЧКА ИЛИ ПЕРСОНАЖ)
        const loader = new GLTFLoader();
        let player;
        const MODEL_URL = 'https://githubusercontent.com';

        loader.load(MODEL_URL, (gltf) => {
            player = gltf.scene;
            player.scale.set(2, 2, 2);
            scene.add(player);
        }, undefined, () => {
            // Если модель не нашлась - ставим КРАСНУЙ КУБ (чтобы не было пусто)
            player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0xff0000}));
            player.position.y = 0.5;
            scene.add(player);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (player) {
                // Плеер "бежит" вперед (дорога движется под ним)
                scene.children.forEach(child => {
                    if (child !== camera && child !== light && child !== player) {
                        child.position.z += 0.2;
                        if (child.position.z > 20) child.position.z = -80;
                    }
                });
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
