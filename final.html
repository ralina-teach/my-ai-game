<!DOCTYPE html>
<html>
<head>
    <style>body { margin: 0; overflow: hidden; background: #87CEEB; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        // Камера СИЛЬНО ПОД УКЛОНОМ, чтобы дорогу было видно СРАЗУ
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // ОГРОМНАЯ ДОРОГА
        const road = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 1000), 
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // ГИГАНТСКИЙ КРАСНЫЙ КУБ (чтобы не промахнуться)
        const player = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4), 
            new THREE.MeshStandardMaterial({ color: 0xff0000 })
        );
        player.position.set(0, 2, 0);
        scene.add(player);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
