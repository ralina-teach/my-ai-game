<!DOCTYPE html>
<html>
<head>
    <title>3D GAME FINAL</title>
    <style>body { margin: 0; overflow: hidden; background: #87CEEB; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Камера стоит сбоку и сверху, чтобы ТОЧНО видеть и дорогу, и куб
        camera.position.set(10, 10, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // ОГРОМНАЯ ДОРОГА
        const road = new THREE.Mesh(
            new THREE.PlaneBufferGeometry(100, 100), 
            new THREE.MeshStandardMaterial({ color: 0x444444 })
        );
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // КРАСНЫЙ КУБ ПРЯМО В ЦЕНТРЕ
        const player = new THREE.Mesh(
            new THREE.BoxBufferGeometry(3, 3, 3), 
            new THREE.MeshStandardMaterial({ color: 0xff0000 })
        );
        player.position.y = 1.5;
        scene.add(player);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
