<!DOCTYPE html>
<html>
<head>
    <title>3D GAME READY</title>
    <style>body { margin: 0; overflow: hidden; background: #87CEEB; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 1, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // ДОРОГА
        const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // ОБЪЕКТЫ ПО БОКАМ (Деревья и дома)
        for (let i = -100; i < 20; i += 10) {
            const box = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
            box.position.set(i % 20 === 0 ? -7 : 7, 2, i);
            scene.add(box);
        }

        // ПЕРСОНАЖ (Красный куб)
        const player = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.y = 1;
        scene.add(player);

        function animate() {
            requestAnimationFrame(animate);
            // Создаем эффект движения
            scene.children.forEach(obj => {
                if (obj.geometry && obj.geometry.type === 'BoxGeometry' && obj !== player) {
                    obj.position.z += 0.2;
                    if (obj.position.z > 15) obj.position.z = -85;
                }
            });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
