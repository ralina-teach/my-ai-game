<!DOCTYPE html>
<html>
<head>
    <title>3D GAME</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #score { position: absolute; top: 20px; left: 20px; color: white; font-size: 30px; z-index: 10; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="score">СЧЕТ: 0</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com",
            "three/addons/": "https://unpkg.com"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const road = new THREE.Mesh(new THREE.PlaneGeometry(10, 1000), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const loader = new GLTFLoader();
        let player;
        // ВСТАВЬ СВОЮ ССЫЛКУ МЕЖДУ КАВЫЧКАМИ:
        const MODEL_URL = 'blob:https://github.com/a7b09ab8-b683-4824-9f9e-c8705bc1a872'; 

        loader.load(MODEL_URL, (gltf) => {
            player = gltf.scene;
            player.scale.set(2, 2, 2);
            scene.add(player);
        });

        let lane = 0;
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && lane > -1) lane--;
            if (e.key === 'ArrowRight' && lane < 1) lane++;
        });

        function animate() {
            requestAnimationFrame(animate);
            if (player) player.position.x = THREE.MathUtils.lerp(player.position.x, lane * 3, 0.1);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
