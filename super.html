<!DOCTYPE html>
<html>
<head>
    <title>3D GAME</title>
    <style>body { margin: 0; overflow: hidden; background: skyblue; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com';
        import { GLTFLoader } from 'https://unpkg.com';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('skyblue');
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const loader = new GLTFLoader();
        let player;

        // Пытаемся загрузить твою утку
        loader.load('https://githubusercontent.com', (gltf) => {
            player = gltf.scene;
            player.scale.set(3, 3, 3);
            scene.add(player);
        }, undefined, () => {
            // ЕСЛИ УТКА НЕ НАШЛАСЬ - СОЗДАЕМ ЗЕЛЕНЫЙ КУБ
            const geo = new THREE.BoxGeometry(3, 3, 3);
            player = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
            player.position.y = 1.5;
            scene.add(player);
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
