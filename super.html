<!DOCTYPE html>
<html>
<head>
    <title>3D GAME FINAL CHECK</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        #score { position: absolute; top: 20px; left: 20px; color: white; font-size: 30px; z-index: 10; font-family: sans-serif; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="score">СЧЁТ: 0</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com",
            "three/addons/": "https://unpkg.com"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        // Ставим камеру повыше и подальше, чтобы точно всё видеть
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 7, 15); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        // ДОРОГА (сделал её шире и ярче)
        const road = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 1000), 
            new THREE.MeshStandardMaterial({ color: 0x555555 })
        );
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const loader = new GLTFLoader();
        let player;

        // Попробуй заменить 'Duck.glb' на свое точное имя файла, если оно другое!
        const MODEL_URL = 'https://githubusercontent.com'; 

        loader.load(MODEL_URL, (gltf) => {
            player = gltf.scene;
            player.scale.set(4, 4, 4); // Делаем модель крупнее
            player.position.y = 0;
            scene.add(player);
        }, undefined, () => {
            // Если модель не нашлась - создаем КУБ
            console.log("Модель не найдена, создаю куб");
            const geo = new THREE.BoxGeometry(3, 3, 3);
            player = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            player.position.y = 1.5;
            scene.add(player);
        });

        let lane = 0;
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && lane > -1) lane--;
            if (e.key === 'ArrowRight' && lane < 1) lane++;
        });

        function animate() {
            requestAnimationFrame(animate);
            if (player) {
                player.position.x = THREE.MathUtils.lerp(player.position.x, lane * 5, 0.1);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
